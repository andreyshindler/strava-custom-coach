stages:
  - deploy

deploy:
  stage: deploy
  only:
    - main
  before_script:
    - apt-get install -y openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - ssh laptop1@187.77.167.35 "
      cd /home/laptop1/.openclaw/workspace/skills/strava-custom-coach &&
      git pull origin main &&
      pm2 restart strava-bot || pm2 start scripts/telegram_bot.py --interpreter python3 --name strava-bot
      "
